<!DOCTYPE html>
<html>
<head>

    <meta http-equiv="refresh" content="0; url=https://fulifi-rr9u.vercel.app?mac=$(mac)&ip=$(ip)&link-login=$(link-login-only)&link-orig=$(link-orig)">
